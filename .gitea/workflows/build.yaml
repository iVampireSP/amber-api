name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: '^1.22'
      - name: Get dependencies
        run: |
          go env -w GO111MODULE=on
          go mod download
      - name: Build
        run: |
          cd cmd
          CGO_ENABLED=0 go build -ldflags "-w -s" -gcflags "-N -l" -o main .
      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: cmd/main
