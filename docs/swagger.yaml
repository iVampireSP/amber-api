definitions:
  entity.Assistant:
    properties:
      created_at:
        type: string
      description:
        type: string
      disable_default_prompt:
        type: boolean
      disable_memory:
        type: boolean
      enable_memory_for_assistant_share:
        type: boolean
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      library:
        $ref: '#/definitions/entity.Library'
      library_id:
        type: integer
      name:
        type: string
      prompt:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.AssistantShare:
    properties:
      assistant:
        $ref: '#/definitions/entity.Assistant'
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      token:
        type: string
      updated_at:
        type: string
    type: object
  entity.AssistantTool:
    properties:
      assistant:
        $ref: '#/definitions/entity.Assistant'
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      tool:
        $ref: '#/definitions/entity.Tool'
      tool_id:
        type: integer
      updated_at:
        type: string
    type: object
  entity.Chat:
    properties:
      assistant_id:
        type: integer
      created_at:
        type: string
      expired_at:
        type: string
      guest_id:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      name:
        type: string
      owner:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.ChatMessage:
    properties:
      assistant_id:
        description: AssistantId 可以让同一个对话中，使用不同的助手来处理消息
        type: integer
      chat_id:
        type: integer
      completion_tokens:
        type: integer
      content:
        type: string
      created_at:
        type: string
      file:
        $ref: '#/definitions/entity.File'
      file_id:
        description: |-
          FileId
          虽然有了 UserFileId， 但是 File Id 还是应该保留，因为这个是针对访客用户的
        type: integer
      hidden:
        type: boolean
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      prompt_tokens:
        type: integer
      role:
        type: string
      total_tokens:
        type: integer
      updated_at:
        type: string
      user_file:
        $ref: '#/definitions/entity.UserFile'
      user_file_id:
        type: integer
    type: object
  entity.Document:
    properties:
      chunked:
        type: boolean
      created_at:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      library:
        $ref: '#/definitions/entity.Library'
      library_id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  entity.File:
    properties:
      created_at:
        type: string
      expired_at:
        description: |-
          TODO: 移除 file 的到期时间，如果当 file 没有任何引用的时候再删除
          因为有外键，所以直接删除是删不掉的，必须删除消息
        type: string
      file_hash:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      mime_type:
        type: string
      path:
        type: string
      public:
        description: 是否公开，访客上传的文件应始终公开，或归属于所有者
        type: boolean
      size:
        type: integer
      updated_at:
        type: string
      url:
        type: string
      url_hash:
        type: string
    type: object
  entity.Library:
    properties:
      created_at:
        type: string
      default:
        type: boolean
      description:
        type: string
      documents:
        items:
          $ref: '#/definitions/entity.Document'
        type: array
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.Memory:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.Tool:
    properties:
      api_key:
        type: string
      created_at:
        type: string
      data:
        $ref: '#/definitions/schema.ToolDiscoveryOutput'
      description:
        type: string
      discovery_url:
        type: string
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  entity.UserFile:
    properties:
      created_at:
        type: string
      file:
        $ref: '#/definitions/entity.File'
      file_id:
        type: integer
      id:
        description: Id        schema.EntityId `gorm:"primarykey" json:"id,string"`
        type: integer
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  schema.AddPublicChatMessageRequest:
    properties:
      assistant_token:
        type: string
      guest_id:
        type: string
      message:
        type: string
      role:
        enum:
        - user
        - user_hide
        - system
        - system_hide
        - assistant
        type: string
    required:
    - assistant_token
    - guest_id
    - message
    - role
    type: object
  schema.AssistantCreateRequest:
    properties:
      description:
        maxLength: 255
        type: string
      disable_default_prompt:
        enum:
        - true
        - false
        type: boolean
      name:
        maxLength: 255
        type: string
      prompt:
        maxLength: 512
        type: string
    required:
    - description
    - name
    type: object
  schema.AssistantLibraryRequest:
    properties:
      library_id:
        type: integer
    required:
    - library_id
    type: object
  schema.AssistantUpdateRequest:
    properties:
      description:
        maxLength: 255
        type: string
      disable_default_prompt:
        enum:
        - true
        - false
        type: boolean
      disable_memory:
        enum:
        - true
        - false
        type: boolean
      enable_memory_for_assistant_share:
        enum:
        - true
        - false
        type: boolean
      library_id:
        type: integer
      name:
        maxLength: 255
        type: string
      prompt:
        maxLength: 512
        type: string
    type: object
  schema.ChatCreateRequest:
    properties:
      assistant_id:
        type: integer
      expired_at:
        $ref: '#/definitions/schema.CustomTime'
      name:
        maxLength: 30
        type: string
    required:
    - name
    type: object
  schema.ChatMessageAddRequest:
    properties:
      assistant_id:
        type: integer
      message:
        maxLength: 255
        type: string
      role:
        enum:
        - user
        - user_hide
        - system
        - system_hide
        - assistant
        - image
        type: string
    required:
    - message
    - role
    type: object
  schema.ChatMessageResponse:
    properties:
      stream:
        type: boolean
      stream_id:
        type: string
    type: object
  schema.ChatPublicListRequest:
    properties:
      guest_id:
        type: string
    required:
    - guest_id
    type: object
  schema.ChatPublicRequest:
    properties:
      assistant_token:
        type: string
      guest_id:
        type: string
      name:
        maxLength: 32
        type: string
    required:
    - assistant_token
    - guest_id
    - name
    type: object
  schema.ChatUpdateRequest:
    properties:
      assistant_id:
        type: integer
      expired_at:
        $ref: '#/definitions/schema.CustomTime'
      name:
        maxLength: 30
        type: string
    required:
    - name
    type: object
  schema.CurrentUserResponse:
    properties:
      ip:
        type: string
      userEmail:
        type: string
      userId:
        type: string
      userName:
        type: string
      valid:
        type: boolean
    type: object
  schema.CustomTime:
    properties:
      time.Time:
        type: string
    type: object
  schema.DocumentCreateRequest:
    properties:
      content:
        type: string
      name:
        type: string
    required:
    - content
    - name
    type: object
  schema.FunctionsInput:
    properties:
      description:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/schema.ToolDiscoveryOutputFunctionParameters'
    required:
    - description
    - name
    - parameters
    type: object
  schema.GetPublicChatMessageRequest:
    properties:
      assistant_token:
        type: string
      guest_id:
        type: string
    required:
    - assistant_token
    - guest_id
    type: object
  schema.LibraryCreateRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  schema.LibraryUpdateRequest:
    properties:
      default:
        type: boolean
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  schema.OpenAIChatCompletionRequest:
    properties:
      max_tokens:
        description: Optional
        type: integer
      messages:
        description: Required
        items:
          $ref: '#/definitions/schema.OpenAIChatCompletionRequestMessage'
        type: array
      model:
        description: Required
        type: string
      "n":
        description: Optional
        type: integer
      stream:
        description: Optional
        type: boolean
      temperature:
        description: Optional
        type: number
      top_p:
        description: Optional
        type: number
    type: object
  schema.OpenAIChatCompletionRequestMessage:
    properties:
      content:
        description: Required
      image_url:
        $ref: '#/definitions/schema.OpenAIImageUrl'
      role:
        description: Required
        type: string
    type: object
  schema.OpenAIChatCompletionResponse:
    properties:
      choices:
        items:
          $ref: '#/definitions/schema.OpenAIChatCompletionResponseChoice'
        type: array
      created:
        type: integer
      id:
        type: string
      model:
        type: string
      object:
        type: string
      usage:
        $ref: '#/definitions/schema.TokenUsage'
    type: object
  schema.OpenAIChatCompletionResponseChoice:
    properties:
      index:
        type: integer
      message:
        $ref: '#/definitions/schema.OpenAIChatCompletionRequestMessage'
    type: object
  schema.OpenAIImageUrl:
    properties:
      detail:
        type: string
      url:
        type: string
    type: object
  schema.ResponseBody:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  schema.TokenUsage:
    properties:
      completion_tokens:
        type: integer
      prompt_tokens:
        type: integer
      total_tokens:
        type: integer
    type: object
  schema.ToolCreateRequest:
    properties:
      api_key:
        maxLength: 255
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      url:
        maxLength: 255
        type: string
    required:
    - description
    - name
    - url
    type: object
  schema.ToolDiscoveryInput:
    properties:
      callback_url:
        type: string
      description:
        type: string
      functions:
        items:
          $ref: '#/definitions/schema.FunctionsInput'
        type: array
      homepage_url:
        type: string
      name:
        type: string
    required:
    - description
    - name
    type: object
  schema.ToolDiscoveryOutput:
    properties:
      callback_url:
        type: string
      description:
        type: string
      function:
        items:
          $ref: '#/definitions/schema.ToolDiscoveryOutputFunctions'
        type: array
      homepage_url:
        type: string
      name:
        type: string
    type: object
  schema.ToolDiscoveryOutputFunction:
    properties:
      description:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/schema.ToolDiscoveryOutputFunctionParameters'
    type: object
  schema.ToolDiscoveryOutputFunctionParameters:
    properties:
      properties: {}
      required:
        items:
          type: string
        type: array
      type:
        type: string
    required:
    - properties
    - required
    - type
    type: object
  schema.ToolDiscoveryOutputFunctions:
    properties:
      functions:
        items:
          $ref: '#/definitions/schema.ToolDiscoveryOutputFunction'
        type: array
      type:
        type: string
    type: object
info:
  contact: {}
  title: Leaflow Amber
  version: "1.0"
paths:
  /api/openai-compatible/v1/chat/completions:
    post:
      consumes:
      - application/json
      description: 兼容 OpenAI Chat Completion 接口，认证需要使用 Assistant Share Token
      parameters:
      - description: 指定聊天中的用户 IP 地址，不指定则自动获取。此 IP 地址只会增加至 Prompt 中，如果不希望增加，请关闭系统自带
          Prompt 选项
        in: header
        name: X-User-IP
        type: string
      - description: Chat
        in: body
        name: chat
        required: true
        schema:
          $ref: '#/definitions/schema.OpenAIChatCompletionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/schema.OpenAIChatCompletionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: OpenAI Chat Completion
      tags:
      - chat
  /api/v1/assistants:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.Assistant'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取 Assistant 列表
      tags:
      - assistant
    post:
      consumes:
      - application/json
      parameters:
      - description: Assistant
        in: body
        name: assistant
        required: true
        schema:
          $ref: '#/definitions/schema.AssistantCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/entity.Assistant'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 创建 Assistant
      tags:
      - assistant
  /api/v1/assistants/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 删除 Assistant
      tags:
      - assistant
    get:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/entity.Assistant'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取指定的 Assistant
      tags:
      - assistant
    put:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Assistant Update
        in: body
        name: assistantUpdateRequest
        required: true
        schema:
          $ref: '#/definitions/schema.AssistantUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/entity.Assistant'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 更新 Assistant
      tags:
      - assistant
  /api/v1/assistants/{id}/library:
    delete:
      consumes:
      - application/json
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 解绑资料库
      tags:
      - assistant
    post:
      consumes:
      - application/json
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      - description: AssistantLibraryRequest
        in: body
        name: AssistantLibraryRequest
        required: true
        schema:
          $ref: '#/definitions/schema.AssistantLibraryRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 绑定资料库
      tags:
      - assistant
  /api/v1/assistants/{id}/shares:
    get:
      consumes:
      - application/json
      description: 此 API 可以创建一个 Assistant 共享 Token，可以将你的 Assistant 公开出去使用。
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.AssistantShare'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取 Assistant 共享列表
      tags:
      - assistant
    post:
      consumes:
      - application/json
      description: 此方法将会获取一个 Token，用户将会通过这个 Token 来访问你的 Assistant 并调用工具。
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/entity.AssistantShare'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 创建 Assistant 共享
      tags:
      - assistant
  /api/v1/assistants/{id}/shares/{share_id}:
    delete:
      consumes:
      - application/json
      description: 此方法将会删除共享，删除后，共享将会立即失效。
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      - in: path
        name: share_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 删除 Assistant 共享
      tags:
      - assistant
  /api/v1/assistants/{id}/tools:
    get:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.AssistantTool'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取 Assistant 所绑定的 Tool
      tags:
      - assistant
  /api/v1/assistants/{id}/tools/{tool_id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Tool ID
        in: path
        name: tool_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/entity.AssistantTool'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 解绑 Tool
      tags:
      - assistant
    post:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Tool ID
        in: path
        name: tool_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/entity.AssistantTool'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 绑定 Tool
      tags:
      - assistant
  /api/v1/chat_public:
    get:
      consumes:
      - application/json
      parameters:
      - description: ChatPublicListRequest
        in: body
        name: schema.ChatPublicListRequest
        required: true
        schema:
          $ref: '#/definitions/schema.ChatPublicListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.Chat'
