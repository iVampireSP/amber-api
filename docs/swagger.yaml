definitions:
  rag-new_internal_entity.Assistant:
    properties:
      created_at:
        type: string
      description:
        type: string
      disable_default_prompt:
        type: boolean
      id:
        type: integer
      name:
        type: string
      prompt:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_entity.AssistantShare:
    properties:
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      token:
        type: string
      updated_at:
        type: string
    type: object
  rag-new_internal_entity.AssistantTool:
    properties:
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      tool_id:
        type: integer
      updated_at:
        type: string
    type: object
  rag-new_internal_entity.AssistantToolType:
    properties:
      assistant:
        $ref: '#/definitions/rag-new_internal_entity.Assistant'
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      tool:
        $ref: '#/definitions/rag-new_internal_entity.Tool'
      tool_id:
        type: integer
      updated_at:
        type: string
    type: object
  rag-new_internal_entity.Chat:
    properties:
      assistant_id:
        type: integer
      created_at:
        type: string
      expired_at:
        type: string
      guest_id:
        type: string
      id:
        type: integer
      name:
        type: string
      owner:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_entity.ChatMessage:
    properties:
      assistant_id:
        type: integer
      completion_tokens:
        type: integer
      content:
        type: string
      created_at:
        type: string
      hidden:
        type: boolean
      id:
        type: integer
      prompt_tokens:
        type: integer
      role:
        type: string
      total_tokens:
        type: integer
      updated_at:
        type: string
    type: object
  rag-new_internal_entity.Tool:
    properties:
      api_key:
        type: string
      created_at:
        type: string
      data:
        $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutput'
      description:
        type: string
      discovery_url:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_schema.AddPublicChatMessageRequest:
    properties:
      assistant_token:
        type: string
      guest_id:
        type: string
      message:
        type: string
      role:
        enum:
        - user
        - user_hide
        - system
        - system_hide
        - assistant
        type: string
    required:
    - assistant_token
    - guest_id
    - message
    - role
    type: object
  rag-new_internal_schema.AssistantCreateRequest:
    properties:
      description:
        maxLength: 255
        type: string
      disable_default_prompt:
        enum:
        - true
        - false
        type: boolean
      name:
        maxLength: 255
        type: string
      prompt:
        maxLength: 512
        type: string
    required:
    - description
    - name
    type: object
  rag-new_internal_schema.AssistantUpdateRequest:
    properties:
      description:
        maxLength: 255
        type: string
      disable_default_prompt:
        enum:
        - true
        - false
        type: boolean
      name:
        maxLength: 255
        type: string
      prompt:
        maxLength: 512
        type: string
    type: object
  rag-new_internal_schema.ChatCreateRequest:
    properties:
      assistant_id:
        type: integer
      name:
        maxLength: 30
        type: string
    required:
    - assistant_id
    - name
    type: object
  rag-new_internal_schema.ChatMessageAddRequest:
    properties:
      message:
        maxLength: 255
        type: string
      role:
        enum:
        - user
        - user_hide
        - system
        - system_hide
        - assistant
        - image
        type: string
    required:
    - message
    - role
    type: object
  rag-new_internal_schema.ChatMessageResponse:
    properties:
      stream:
        type: boolean
      stream_id:
        type: string
    type: object
  rag-new_internal_schema.ChatPublicListRequest:
    properties:
      guest_id:
        type: string
    required:
    - guest_id
    type: object
  rag-new_internal_schema.ChatPublicRequest:
    properties:
      assistant_token:
        type: string
      guest_id:
        type: string
      name:
        maxLength: 32
        type: string
    required:
    - assistant_token
    - guest_id
    - name
    type: object
  rag-new_internal_schema.CurrentUserResponse:
    properties:
      ip:
        type: string
      userEmail:
        type: string
      userId:
        type: integer
      userName:
        type: string
      valid:
        type: boolean
    type: object
  rag-new_internal_schema.FunctionsInput:
    properties:
      description:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunctionParameters'
    required:
    - description
    - name
    - parameters
    type: object
  rag-new_internal_schema.GetPublicChatMessageRequest:
    properties:
      assistant_token:
        type: string
      guest_id:
        type: string
    required:
    - assistant_token
    - guest_id
    type: object
  rag-new_internal_schema.OpenAIChatCompletionRequest:
    properties:
      max_tokens:
        description: Optional
        type: integer
      messages:
        description: Required
        items:
          $ref: '#/definitions/rag-new_internal_schema.OpenAIChatCompletionRequestMessage'
        type: array
      model:
        description: Required
        type: string
      "n":
        description: Optional
        type: integer
      stream:
        description: Optional
        type: boolean
      temperature:
        description: Optional
        type: number
      top_p:
        description: Optional
        type: number
    type: object
  rag-new_internal_schema.OpenAIChatCompletionRequestMessage:
    properties:
      content:
        description: Required
        type: string
      role:
        description: Required
        type: string
    type: object
  rag-new_internal_schema.OpenAIChatCompletionResponse:
    properties:
      choices:
        items:
          $ref: '#/definitions/rag-new_internal_schema.OpenAIChatCompletionResponseChoice'
        type: array
      created:
        type: integer
      id:
        type: string
      model:
        type: string
      object:
        type: string
      usage:
        $ref: '#/definitions/rag-new_internal_schema.TokenUsage'
    type: object
  rag-new_internal_schema.OpenAIChatCompletionResponseChoice:
    properties:
      index:
        type: integer
      message:
        $ref: '#/definitions/rag-new_internal_schema.OpenAIChatCompletionRequestMessage'
    type: object
  rag-new_internal_schema.ResponseBody:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  rag-new_internal_schema.TokenUsage:
    properties:
      completion_tokens:
        type: integer
      prompt_tokens:
        type: integer
      total_tokens:
        type: integer
    type: object
  rag-new_internal_schema.ToolCreateRequest:
    properties:
      api_key:
        maxLength: 255
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      url:
        maxLength: 255
        type: string
    required:
    - description
    - name
    - url
    type: object
  rag-new_internal_schema.ToolDiscoveryInput:
    properties:
      callback_url:
        type: string
      description:
        type: string
      functions:
        items:
          $ref: '#/definitions/rag-new_internal_schema.FunctionsInput'
        type: array
      homepage_url:
        type: string
      name:
        type: string
    required:
    - description
    - name
    type: object
  rag-new_internal_schema.ToolDiscoveryOutput:
    properties:
      callback_url:
        type: string
      description:
        type: string
      function:
        items:
          $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunctions'
        type: array
      homepage_url:
        type: string
      name:
        type: string
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunction:
    properties:
      description:
        type: string
      name:
        type: string
      parameters:
        $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunctionParameters'
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunctionParameters:
    properties:
      properties: {}
      required:
        items:
          type: string
        type: array
      type:
        type: string
    required:
    - properties
    - required
    - type
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunctions:
    properties:
      functions:
        items:
          $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunction'
        type: array
      type:
        type: string
    type: object
info:
  contact: {}
  title: Leaflow Amber
  version: "1.0"
paths:
  /api/openai-compatible/v1/chat/completions:
    post:
      consumes:
      - application/json
      description: 兼容 OpenAI Chat Completion 接口，认证需要使用 Assistant Share Token
      parameters:
      - description: 指定聊天中的用户 IP 地址，不指定则自动获取。此 IP 地址只会增加至 Prompt 中，如果不希望增加，请关闭系统自带
          Prompt 选项
        in: header
        name: X-User-IP
        type: string
      - description: Chat
        in: body
        name: chat
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.OpenAIChatCompletionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag-new_internal_schema.OpenAIChatCompletionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: OpenAI Chat Completion
      tags:
      - chat
  /api/v1/assistants:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/rag-new_internal_entity.Assistant'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取 Assistant 列表
      tags:
      - assistant
    post:
      consumes:
      - application/json
      parameters:
      - description: Assistant
        in: body
        name: assistant
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.AssistantCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.Assistant'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 创建 Assistant
      tags:
      - assistant
  /api/v1/assistants/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 删除 Assistant
      tags:
      - assistant
    get:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.Assistant'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取指定的 Assistant
      tags:
      - assistant
    patch:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Assistant Update
        in: body
        name: assistantUpdateRequest
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.AssistantUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.Assistant'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 更新 Assistant
      tags:
      - assistant
  /api/v1/assistants/{id}/shares:
    get:
      consumes:
      - application/json
      description: 此 API 可以创建一个 Assistant 共享 Token，可以将你的 Assistant 公开出去使用。
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/rag-new_internal_entity.AssistantShare'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取 Assistant 共享列表
      tags:
      - assistant
    post:
      consumes:
      - application/json
      description: 此方法将会获取一个 Token，用户将会通过这个 Token 来访问你的 Assistant 并调用工具。
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.AssistantShare'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 创建 Assistant 共享
      tags:
      - assistant
  /api/v1/assistants/{id}/shares/{share_id}:
    delete:
      consumes:
      - application/json
      description: 此方法将会删除共享，删除后，共享将会立即失效。
      parameters:
      - in: path
        name: id
        required: true
        type: integer
      - in: path
        name: share_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 删除 Assistant 共享
      tags:
      - assistant
  /api/v1/assistants/{id}/tools:
    get:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/rag-new_internal_entity.AssistantToolType'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 获取 Assistant 所绑定的 Tool
      tags:
      - assistant
  /api/v1/assistants/{id}/tools/{tool_id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Tool ID
        in: path
        name: tool_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.AssistantTool'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 解绑 Tool
      tags:
      - assistant
    post:
      consumes:
      - application/json
      parameters:
      - description: Assistant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Tool ID
        in: path
        name: tool_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.AssistantTool'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      security:
      - ApiKeyAuth: []
      summary: 绑定 Tool
      tags:
      - assistant
  /api/v1/chat_public:
    get:
      consumes:
      - application/json
      parameters:
      - description: ChatPublicListRequest
        in: body
        name: schema.ChatPublicListRequest
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.ChatPublicListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/rag-new_internal_entity.Chat'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      summary: 获取公开对话
      tags:
      - chat_public
    post:
      consumes:
      - application/json
      parameters:
      - description: ChatPublicRequest
        in: body
        name: schema.ChatPublicRequest
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.ChatPublicRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_entity.Chat'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      summary: 通过 API 创建一个公开的对话记录
      tags:
      - chat_public
  /api/v1/chat_public/{chat_id}/clear:
    post:
      consumes:
      - application/json
      parameters:
      - in: path
        name: chat_id
        required: true
        type: integer
      - description: GetPublicChatMessageRequest
        in: body
        name: schema.GetPublicChatMessageRequest
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.GetPublicChatMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      summary: 清空公开对话的聊天记录
      tags:
      - chat_public
  /api/v1/chat_public/{chat_id}/messages:
    get:
      consumes:
      - application/json
      parameters:
      - in: path
        name: chat_id
        required: true
        type: integer
      - in: query
        name: assistant_token
        required: true
        type: string
      - in: query
        name: guest_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/rag-new_internal_entity.ChatMessage'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      summary: 获取公开对话的聊天记录
      tags:
      - chat_public
    post:
      consumes:
      - application/json
      parameters:
      - in: path
        name: chat_id
        required: true
        type: integer
      - description: AddPublicChatMessageRequest
        in: body
        name: schema.AddPublicChatMessageRequest
        required: true
        schema:
          $ref: '#/definitions/rag-new_internal_schema.AddPublicChatMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_schema.ChatMessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
        "409":
          description: Conflict
          schema:
            allOf:
            - $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
            - properties:
                data:
                  $ref: '#/definitions/rag-new_internal_schema.ChatMessageResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/rag-new_internal_schema.ResponseBody'
      summary: 增加公开对话的聊天记录
      tags:
      - chat_public
  /api/v1/chats:
    get:
      consumes:
      - application/json
      description: get string by ID
      parameters:
      - description: Assistant ID
        in: query
        name: assistant_id
        type: integer
      produces:
      - application/json
