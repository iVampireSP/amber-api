definitions:
  rag-new_internal_entity.Tool:
    properties:
      api_key:
        type: string
      created_at:
        type: string
      data:
        $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutput'
      description:
        type: string
      discovery_url:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_schema.CurrentUserResponse:
    properties:
      ip:
        type: string
      userEmail:
        type: string
      userId:
        type: integer
      valid:
        type: boolean
    type: object
  rag-new_internal_schema.EmptyData:
    type: object
  rag-new_internal_schema.ResponseBody:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  rag-new_internal_schema.ToolCreateRequest:
    properties:
      api_key:
        maxLength: 255
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      url:
        maxLength: 255
        type: string
    required:
    - description
    - name
    - url
    type: object
  rag-new_internal_schema.ToolDiscoveryOutput:
    properties:
      callback_url:
        type: string
      description:
        type: string
      function:
        items:
          $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunctions'
        type: array
      homepage_url:
        type: string
      name:
        type: string
      tool_id:
        type: integer
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunction:
    properties:
      description:
        type: string
      name:
        type: string
      parameters: {}
      required:
        items:
          type: string
        type: array
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunctions:
    properties:
      function:
        items:
          $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunction'
        type: array
      type:
        type: string
    type: object
