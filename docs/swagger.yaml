definitions:
  rag-new_internal_entity.Assistant:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      prompt:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_entity.AssistantTool:
    properties:
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      tool_id:
        type: integer
      updated_at:
        type: string
    type: object
  rag-new_internal_entity.Chat:
    properties:
      assistant_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_entity.ChatMessage:
    properties:
      assistant_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      input_tokens:
        type: integer
      output_tokens:
        type: integer
      role:
        type: string
      total_tokens:
        type: integer
      updated_at:
        type: string
    type: object
  rag-new_internal_entity.Tool:
    properties:
      api_key:
        type: string
      created_at:
        type: string
      data:
        $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutput'
      description:
        type: string
      discovery_url:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  rag-new_internal_schema.AssistantCreateRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      prompt:
        type: string
    required:
    - description
    - name
    type: object
  rag-new_internal_schema.ChatCreateRequest:
    properties:
      assistant_id:
        type: integer
      name:
        maxLength: 255
        type: string
    required:
    - assistant_id
    - name
    type: object
  rag-new_internal_schema.ChatMessageAddRequest:
    properties:
      message:
        maxLength: 255
        type: string
    required:
    - message
    type: object
  rag-new_internal_schema.ChatMessageResponse:
    properties:
      stream_id:
        type: string
    type: object
  rag-new_internal_schema.CurrentUserResponse:
    properties:
      ip:
        type: string
      userEmail:
        type: string
      userId:
        type: integer
      valid:
        type: boolean
    type: object
  rag-new_internal_schema.ResponseBody:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  rag-new_internal_schema.ToolCreateRequest:
    properties:
      api_key:
        maxLength: 255
        type: string
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      url:
        maxLength: 255
        type: string
    required:
    - description
    - name
    - url
    type: object
  rag-new_internal_schema.ToolDiscoveryOutput:
    properties:
      callback_url:
        type: string
      description:
        type: string
      function:
        items:
          $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunctions'
        type: array
      homepage_url:
        type: string
      name:
        type: string
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunction:
    properties:
      description:
        type: string
      name:
        type: string
      parameters: {}
      required:
        items:
          type: string
        type: array
    type: object
  rag-new_internal_schema.ToolDiscoveryOutputFunctions:
    properties:
      function:
        items:
          $ref: '#/definitions/rag-new_internal_schema.ToolDiscoveryOutputFunction'
        type: array
      type:
        type: string
    type: object
info:
